model:
  kind: student_hybrid
  name: student_hybrid_tiny
  input_shape: [18, 8, 8]
  policy_buckets: 20480
  conv_channels: 24
  d_model: 64
  layers: 2
  heads: 4
  ffn_dim: 128
  dropout: 0.05

training:
  policy_loss: distill_kl
  wdl_loss: distill_kl
  value_loss: mse
  moves_left_loss: mse

export:
  onnx:
    dynamo: true
    input_names: [board]
    output_names: [policy_logits, wdl_logits, moves_left]
    dynamic_batch: true

inference:
  legal_policy_masking: outside_or_forward_optional
  tensorrt_notes:
    - Export with dynamic batch for TensorRT engine caching.
    - Validate parity against PyTorch before enabling FP16.
